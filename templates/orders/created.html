{% extends "base.html" %}

{% block title %}Order Successful - AeroCart{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="glass-card p-12 max-w-lg w-full text-center bg-white/80 border border-white shadow-2xl relative overflow-hidden transform hover:-translate-y-2 transition-transform duration-500">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-green-200 rounded-full blur-[40px] opacity-50 mix-blend-multiply"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-200 rounded-full blur-[40px] opacity-50 mix-blend-multiply"></div>
        
        <div class="w-24 h-24 bg-gradient-to-br from-green-100 to-green-200 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner border-4 border-white relative z-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-500 drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        
        <h1 class="text-4xl font-bold text-gray-900 mb-4 tracking-tight relative z-10">Order Confirmed!</h1>
        <p class="text-gray-600 mb-2 text-lg font-medium relative z-10">Thank you for your purchase.</p>
        <p class="text-gray-500 mb-10 border-t border-gray-200/70 pt-6 mt-6 relative z-10">
            Your order number is <br>
            <strong class="inline-block mt-3 text-2xl text-blue-700 bg-blue-50 px-6 py-2 rounded-xl font-mono border border-blue-100 shadow-inner">#{{ order.id }}</strong>
        </p>
        
        <a href="{% url 'products:product_list' %}" class="btn-primary w-full px-8 py-4 rounded-xl font-bold inline-block text-lg shadow-xl tracking-wide relative z-10 hover:shadow-blue-500/30">Continue Shopping</a>
    </div>
</div>
{% endblock %}
